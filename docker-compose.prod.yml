# Production stack for AWS EC2 behind Cloudflare.
# DB = MongoDB Atlas, storage = Cloudflare R2 (both external — no local containers).
# Caddy terminates TLS with a Cloudflare Origin Certificate and proxies to the app.
#
# Usage on the server:
#   1. Create .env from .env.example and fill in real values (Atlas + R2).
#   2. Put the Cloudflare Origin cert/key in ./certs/origin.pem and ./certs/origin.key.
#   3. DOMAIN=your-domain.com docker compose -f docker-compose.prod.yml up -d --build
services:
  app:
    build:
      context: .
      # Compose interpolates ${...} from the project-dir .env file at build time.
      args:
        DATABASE_URL: ${DATABASE_URL}
        PAYLOAD_SECRET: ${PAYLOAD_SECRET}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
        NEXT_PUBLIC_CDN_URL: ${NEXT_PUBLIC_CDN_URL}
        NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
        STORAGE_PROVIDER: ${STORAGE_PROVIDER}
        S3_BUCKET: ${S3_BUCKET}
        S3_REGION: ${S3_REGION}
        S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
        S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
        S3_ENDPOINT: ${S3_ENDPOINT}
    env_file: .env
    environment:
      NODE_ENV: production
      # Signals ingestion (runtime-only). Defaults apply out of the box;
      # any of them can be overridden from the server .env.
      SIGNALS_SYNC_ENABLED: ${SIGNALS_SYNC_ENABLED:-true}
      SIGNALS_API_URL: ${SIGNALS_API_URL:-http://5.78.144.147:8790/api/signals}
      SIGNALS_SYNC_INTERVAL_MS: ${SIGNALS_SYNC_INTERVAL_MS:-1800000}
      SIGNALS_SYNC_BATCH_LIMIT: ${SIGNALS_SYNC_BATCH_LIMIT:-50}
      SIGNALS_PUBLISH_DELAY_MINUTES: ${SIGNALS_PUBLISH_DELAY_MINUTES:-30}
      SIGNALS_RETENTION_DAYS: ${SIGNALS_RETENTION_DAYS:-30}
      SIGNALS_RETENTION_LIMIT: ${SIGNALS_RETENTION_LIMIT:-1000}
      # Header ticker sync from Polymarket/Kalshi public APIs (runtime-only).
      TICKER_SYNC_ENABLED: ${TICKER_SYNC_ENABLED:-true}
      TICKER_SYNC_INTERVAL_MS: ${TICKER_SYNC_INTERVAL_MS:-300000}
      TICKER_SYNC_LIMIT_PER_VENUE: ${TICKER_SYNC_LIMIT_PER_VENUE:-10}
      KALSHI_SYNC_MAX_PAGES: ${KALSHI_SYNC_MAX_PAGES:-10}
    restart: unless-stopped
    expose:
      - '3000'

  caddy:
    image: caddy:2-alpine
    depends_on: [app]
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN to your public hostname}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
